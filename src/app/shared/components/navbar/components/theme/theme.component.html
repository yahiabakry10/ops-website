<button
  type="button"
  [class]="
    'group relative flex items-center justify-center size-10 rounded-lg transition-all duration-300 cursor-pointer overflow-hidden ' +
    'hover:scale-105 active:scale-95 ' +
    'bg-gray-100/80 hover:bg-gray-200/90 dark:bg-slate-800/80 dark:hover:bg-slate-700/90 ' +
    'border border-gray-200/50 dark:border-slate-700/50 ' +
    'shadow-sm hover:shadow-md'
  "
  (click)="toggleTheme()"
  [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'"
>
  <!-- Subtle glow effect on hover -->
  <div
    class="absolute inset-0 bg-linear-to-br from-yellow-400/0 to-blue-400/0 group-hover:from-yellow-400/10 group-hover:to-blue-400/10 dark:group-hover:from-yellow-300/5 dark:group-hover:to-blue-300/5 transition-all duration-300 rounded-lg"
  ></div>

  @if (isDarkMode()) {
    <svg
      class="relative z-10 text-amber-400 group-hover:text-amber-300 transition-colors duration-300 group-hover:rotate-45"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <circle cx="12" cy="12" r="5" />
      <path
        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"
      />
    </svg>
  } @else {
    <svg
      class="relative z-10 text-slate-700 group-hover:text-slate-900 dark:text-slate-300 dark:group-hover:text-slate-100 transition-all duration-300 group-hover:-rotate-12"
      width="20"
      height="20"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
    </svg>
  }
</button>
