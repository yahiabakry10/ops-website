<nav
  class="fixed top-0 left-0 right-0 z-100 transition-all duration-700 ease-in-out pointer-events-none"
  aria-label="Main Navigation"
>
  <div
    class="mx-auto transition-all duration-500 px-4 md:px-6 py-2 flex items-center justify-between pointer-events-auto"
    [class]="
      isScrolled()
        ? 'max-w-[95%] md:max-w-[70%] bg-white/90 dark:bg-gray-950/90 backdrop-blur-xl shadow-[0_8px_32px_rgba(0,0,0,0.12)] border border-white/20 dark:border-gray-800/50 rounded-2xl'
        : 'max-w-full bg-transparent'
    "
  >
    <a routerLink="/" class="flex items-center" aria-label="Go to Home Page">
      <img
        src="/images/opsLogo.png"
        alt="OPS - Optimal Professional Solutions Logo"
        class="h-12 md:h-16 w-auto transition-all duration-300"
        [class.logo-white]="!isScrolled()"
        [class.logo-original]="isScrolled()"
      />
    </a>

    <div class="hidden md:flex items-center gap-2">
      <ul class="flex items-center gap-1" role="list">
        @for (item of navItems; track item.routerLink) {
          <li>
            <a
              [routerLink]="item.routerLink"
              routerLinkActive="nav-active"
              ariaCurrentWhenActive="page"
              [class]="
                isScrolled()
                  ? 'relative px-4 py-2 text-[13px] font-bold uppercase tracking-wider text-gray-700 dark:text-gray-200 hover:text-[#2E5AAC] dark:hover:text-brand-secondary transition-all duration-300 overflow-hidden'
                  : 'relative px-4 py-2 text-[13px] font-bold uppercase tracking-wider text-white/95 dark:text-slate-300 hover:text-white dark:hover:text-slate-100 transition-all duration-300 overflow-hidden'
              "
            >
              <span class="relative z-10">{{ 'NAV.ITEMS.' + item.key | translate }}</span>
            </a>
          </li>
        }
      </ul>

      <div
        [class]="
          isScrolled()
            ? 'flex items-center ml-4 pl-4 border-l border-gray-200 dark:border-gray-700 gap-3'
            : 'flex items-center ml-4 pl-4 border-l border-white/20 dark:border-slate-600 gap-3'
        "
      >
        <app-theme />
        <app-language />

        <a
          routerLink="/contact"
          aria-label="Connect with OPS Team"
          class="px-6 py-2.5 bg-[#2E5AAC] hover:bg-blue-700 text-white rounded-xl text-xs font-black uppercase tracking-widest shadow-lg shadow-blue-500/20 active:scale-95 transition-all"
        >
          Connect
        </a>
      </div>
    </div>

    <!-- Mobile Menu Button -->
    <button
      type="button"
      (click)="toggleMobileMenu()"
      [attr.aria-expanded]="isMobileMenuOpen()"
      aria-label="Toggle Mobile Navigation Menu"
      [class]="
        isScrolled()
          ? 'md:hidden w-10 h-10 flex items-center justify-center text-gray-700 dark:text-gray-300'
          : 'md:hidden w-10 h-10 flex items-center justify-center text-white/95 dark:text-slate-300'
      "
    >
      <i
        class="pi mobile-menu-icon"
        style="font-size: 1.5rem"
        [class.pi-align-right]="!isMobileMenuOpen()"
        [class.pi-times]="isMobileMenuOpen()"
        aria-hidden="true"
      ></i>
    </button>
  </div>
</nav>

<div
  class="md:hidden fixed left-0 right-0 z-90 bg-white dark:bg-gray-950 shadow-lg transition-all duration-300 ease-out mobile-menu"
  [class]="isScrolled() ? 'top-[88px]' : 'top-[100px]'"
  [class.mobile-menu-open]="isMobileMenuOpen()"
  [attr.aria-hidden]="!isMobileMenuOpen()"
>
  <div class="px-6 py-6">
    <ul class="space-y-1" role="list">
      @for (item of navItems; track item.routerLink) {
        <li>
          <a
            [routerLink]="item.routerLink"
            routerLinkActive="mobile-nav-active"
            ariaCurrentWhenActive="page"
            class="block px-4 py-3 text-sm font-bold uppercase tracking-wide text-gray-700 dark:text-gray-200 hover:text-[#2E5AAC] dark:hover:text-brand-secondary rounded-lg transition-colors"
          >
            {{ 'NAV.ITEMS.' + item.key | translate }}
          </a>
        </li>
      }
    </ul>

    <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-800">
      <div class="flex items-center gap-4 mb-4 px-4">
        <app-theme />
        <app-language />
      </div>

      <a
        routerLink="/contact"
        aria-label="Connect with OPS Team"
        class="block w-full px-6 py-3 bg-brand-primary hover:bg-brand-primary/80 text-white text-center rounded-xl text-sm font-black uppercase tracking-widest transition-colors"
      >
        Connect
      </a>
    </div>
  </div>
</div>
