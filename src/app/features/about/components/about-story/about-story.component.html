<section class="py-20">
  <div class="section-content-wrapper">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div class="space-y-6" appScrollReveal [hiddenClasses]="['opacity-0', '-translate-x-12']">
        <h2 class="text-4xl font-bold text-gray-900 dark:text-white">
          {{ 'ABOUT.WHO.TITLE' | translate }}
        </h2>
        <div class="space-y-4 text-gray-700 dark:text-gray-300 text-lg leading-relaxed">
          <p>
            <span class="font-bold text-[#2E5AAC] dark:text-[#4A90E2]">
              {{ 'ABOUT.WHO.P1' | translate }}
            </span>
          </p>
          <p>{{ 'ABOUT.WHO.P2' | translate }}</p>
          <p>{{ 'ABOUT.WHO.P3' | translate }}</p>
          <p>{{ 'ABOUT.WHO.P4' | translate }}</p>
        </div>
      </div>
      <div class="relative" appScrollReveal [hiddenClasses]="['opacity-0', 'translate-x-12']">
        <img
          src="/images/whoweare.jpg"
          alt="OPS Team"
          class="rounded-2xl shadow-2xl w-full h-auto dark:opacity-80"
        />
      </div>
    </div>
  </div>
</section>
