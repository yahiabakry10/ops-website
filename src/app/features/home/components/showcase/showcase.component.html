<section
  class="relative py-24 bg-white dark:bg-slate-950 transition-colors duration-500 overflow-hidden"
>
  <div class="max-w-7xl mx-auto px-4 text-center mb-16 relative z-10">
    <h2 class="text-4xl md:text-6xl font-bold text-slate-900 dark:text-white tracking-tight mb-12">
      Our Most Important Work in
      <span class="text-brand-primary">Healthcare Technology</span>
    </h2>

    <div class="flex justify-center mb-16">
      <div
        class="inline-flex p-1.5 bg-slate-100 dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-inner"
      >
        <button
          (click)="toggleView('mobile')"
          [class]="
            showCaseView() === 'mobile' ? 'bg-brand-primary text-white shadow-lg' : 'text-slate-500'
          "
          class="px-8 py-3 rounded-xl font-bold text-sm transition-all duration-300"
        >
          Mobile Apps
        </button>
        <button
          (click)="toggleView('web')"
          [class]="
            showCaseView() === 'web' ? 'bg-brand-primary text-white shadow-lg' : 'text-slate-500'
          "
          class="px-8 py-3 rounded-xl font-bold text-sm transition-all duration-300"
        >
          Web Dashboards
        </button>
      </div>
    </div>

    @if (isReady()) {
      <div class="relative w-full">
        <swiper-container #swiperRef init="false">
          @for (img of showCaseView() === 'mobile' ? mobileImages() : webImages(); track img.src) {
            <swiper-slide
              [class.mobile-slide]="showCaseView() === 'mobile'"
              [class.web-slide]="showCaseView() === 'web'"
              class="py-12"
            >
              <div
                class="device-wrapper"
                [class.phone-frame]="showCaseView() === 'mobile'"
                [class.browser-frame]="showCaseView() === 'web'"
              >
                @if (showCaseView() === 'mobile') {
                  <div class="phone-screen">
                    <div class="dynamic-island"></div>
                    <img [src]="img.src" [alt]="img.alt" loading="eager" />
                  </div>
                } @else {
                  <div class="browser-chrome">
                    <div class="flex gap-2 me-4">
                      <div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
                      <div class="w-2.5 h-2.5 rounded-full bg-yellow-400"></div>
                      <div class="w-2.5 h-2.5 rounded-full bg-green-400"></div>
                    </div>
                    <div class="flex-1 h-5 bg-slate-200 dark:bg-slate-800 rounded-md"></div>
                  </div>
                  <div class="browser-content flex-1 relative">
                    <img [src]="img.src" [alt]="img.alt" loading="eager" />
                  </div>
                }
              </div>
            </swiper-slide>
          }
        </swiper-container>

        <button class="custom-nav-btn prev-btn"><i class="pi pi-chevron-left text-xl"></i></button>
        <button class="custom-nav-btn next-btn"><i class="pi pi-chevron-right text-xl"></i></button>
      </div>
    }
  </div>
</section>
