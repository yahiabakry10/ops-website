<section
  appScrollReveal
  class="py-20 bg-linear-to-r from-[#2E5AAC] to-[#4A90E2] dark:from-[#1e3a7a] dark:to-[#111827] text-white transition-colors duration-300"
>
  <div class="section-content-wrapper text-center">
    <h2 class="text-4xl font-bold mb-6" appScrollReveal [style.transition-delay]="'100ms'">
      {{ 'CTA.TITLE' | translate }}
    </h2>

    <p
      class="text-xl mb-8 opacity-90 dark:text-gray-200 max-w-2xl mx-auto"
      appScrollReveal
      [style.transition-delay]="'200ms'"
    >
      {{ 'CTA.SUBTITLE' | translate }}
    </p>

    <div
      class="flex flex-wrap gap-4 justify-center"
      appScrollReveal
      [style.transition-delay]="'300ms'"
    >
      <a
        routerLink="/products"
        class="inline-flex items-center px-8 py-3 bg-white text-[#2E5AAC] dark:bg-blue-600 dark:text-white dark:hover:bg-blue-700 font-bold rounded-md hover:bg-gray-100 transition-colors duration-300 shadow-md group"
      >
        <i class="pi pi-shopping-cart me-2"></i>
        {{ 'CTA.EXPLORE_PRODUCTS' | translate }}
      </a>

      <a
        routerLink="/contact"
        class="inline-flex items-center px-8 py-3 border-2 border-white dark:border-blue-400 dark:text-blue-400 dark:hover:bg-blue-400/10 text-white font-bold rounded-md hover:bg-white/10 transition-colors duration-300 group"
      >
        <i class="pi pi-calendar me-2"></i>
        {{ 'CTA.SCHEDULE_DEMO' | translate }}
      </a>
    </div>
  </div>
</section>
