<section
  class="relative min-h-screen bg-linear-to-r from-brand-primary to-brand-secondary dark:from-[#0f172a] dark:to-[#111827] text-white overflow-hidden flex flex-col items-center justify-center"
>
  <canvas
    #heroCanvas
    class="absolute inset-0 w-full h-full pointer-events-none z-0"
    aria-hidden="true"
  ></canvas>

  <div
    class="relative z-10 w-full flex flex-col items-center justify-center px-5 sm:px-8 pt-20 pb-28 sm:pt-24 sm:pb-32 text-center"
  >
    <h1
      appScrollReveal
      [hiddenClasses]="['opacity-0', 'translate-y-10']"
      class="max-w-4xl mx-auto text-3xl sm:text-4xl md:text-6xl lg:text-7xl font-bold leading-tight tracking-tight text-[#F8FAFC] dark:text-slate-200 mb-5"
    >
      {{ 'COMPANY.TAGLINE' | translate }}
    </h1>

    <p
      appScrollReveal
      [style.transition-delay]="'200ms'"
      class="max-w-2xl mx-auto text-base sm:text-lg md:text-2xl font-medium text-white/90 dark:text-slate-300 mb-8 leading-relaxed"
    >
      {{ 'COMPANY.SUBTITLE' | translate }}
    </p>

    <p
      appScrollReveal
      [style.transition-delay]="'400ms'"
      class="max-w-2xl mx-auto text-sm sm:text-base md:text-lg text-white/75 dark:text-slate-400 mb-12 leading-relaxed"
    >
      {{ 'COMPANY.DESCRIPTION' | translate }}
    </p>

    <a
      routerLink="/contact"
      appScrollReveal
      [style.transition-delay]="'600ms'"
      [hiddenClasses]="['opacity-0', 'scale-90']"
    >
      <button
        class="inline-flex items-center justify-center gap-2.5 bg-white hover:bg-white/95 dark:bg-slate-100 dark:hover:bg-white text-[#2E5AAC] dark:text-[#2E5AAC] font-semibold text-base sm:text-[17px] px-8 py-4 rounded-xl transition-all duration-200 ease-in-out active:scale-[0.98] cursor-pointer shadow-lg hover:shadow-xl"
      >
        <svg
          class="w-5 h-5 fill-current shrink-0"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M11.25 2.25c.34-1 .66-1 1 0 1.25 3.75 3.75 6.25 7.5 7.5 1 .34 1 .66 0 1-3.75 1.25-6.25 3.75-7.5 7.5-.34 1-.66 1-1 0-1.25-3.75-3.75-6.25-7.5-7.5-1-.34-1-.66 0-1 3.75-1.25 6.25-3.75 7.5-7.5z"
          />
        </svg>

        {{ 'COMPANY.GET_STARTED_NOW' | translate }}

        <svg
          class="w-5 h-5 fill-current shrink-0"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M11.25 2.25c.34-1 .66-1 1 0 1.25 3.75 3.75 6.25 7.5 7.5 1 .34 1 .66 0 1-3.75 1.25-6.25 3.75-7.5 7.5-.34 1-.66 1-1 0-1.25-3.75-3.75-6.25-7.5-7.5-1-.34-1-.66 0-1 3.75-1.25 6.25-3.75 7.5-7.5z"
          />
        </svg>
      </button>
    </a>
  </div>

  <div
    class="absolute bottom-8 inset-s-1/2 -translate-x-1/2 flex flex-col items-center gap-1.5 cursor-pointer opacity-50 hover:opacity-100 transition-opacity duration-300 animate-bounce z-10"
    (click)="scrollToContent()"
  >
    <span class="text-[10px] uppercase tracking-[0.3em] font-bold text-white/90 dark:text-slate-300"
      >Explore</span
    >
    <svg
      class="w-4 h-4 text-white/90 dark:text-slate-300"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="3"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <path d="m6 9 6 6 6-6" />
    </svg>
  </div>
</section>
