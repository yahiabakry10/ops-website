<section class="py-20">
  <div class="section-content-wrapper">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div
        class="order-2 lg:order-1"
        appScrollReveal
        [hiddenClasses]="['opacity-0', '-translate-x-12']"
      >
        <img
          src="/images/mobileApp.jpg"
          alt="Mobile app"
          class="rounded-xl shadow-2xl w-full h-auto object-cover dark:opacity-80"
        />
      </div>

      <div
        class="order-1 lg:order-2"
        appScrollReveal
        [hiddenClasses]="['opacity-0', 'translate-x-12']"
      >
        <h2
          class="text-4xl font-bold text-brand-primary dark:text-brand-secondary mb-6 leading-tight"
        >
          {{ 'PRODUCTS.MOBILE.TITLE' | translate }}
        </h2>
        <p class="text-xl text-slate-700 dark:text-slate-300 mb-8 font-medium">
          {{ 'PRODUCTS.MOBILE.SUBTITLE' | translate }}
        </p>

        <div class="space-y-5">
          @for (feature of mobileAppFeatures(); track feature) {
            <div
              class="flex items-start gap-4 group"
              appScrollReveal
              [style.transition-delay]="$index * 150 + 'ms'"
            >
              <div
                class="w-7 h-7 bg-linear-to-br from-[#2E5AAC] to-[#4A90E2] rounded-full flex items-center justify-center shrink-0 mt-1 shadow-sm group-hover:scale-110 transition-transform"
              >
                <i class="pi pi-check text-white text-[10px] font-bold"></i>
              </div>
              <p class="text-slate-700 dark:text-slate-300 text-lg leading-snug">
                {{ feature | translate }}
              </p>
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</section>
