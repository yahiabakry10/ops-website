<section class="py-20">
  <div class="section-content-wrapper">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
      <div class="order-1" appScrollReveal [hiddenClasses]="['opacity-0', '-translate-x-12']">
        <h2 class="text-4xl font-bold text-slate-900 dark:text-white mb-6">
          <span class="text-brand-primary dark:text-brand-secondary">PremiumERP</span>
        </h2>
        <p class="text-xl text-slate-700 dark:text-slate-300 mb-6 font-medium">
          {{ 'PRODUCTS.ERP.SUBTITLE' | translate }}
        </p>
        <p class="text-slate-600 dark:text-slate-400 mb-8 leading-relaxed">
          {{ 'PRODUCTS.ERP.DESC' | translate }}
        </p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          @for (module of erpModules(); track module.title) {
            <app-secondary-card-info
              appScrollReveal
              [style.transition-delay]="$index * 100 + 'ms'"
              [iconClass]="module.icon"
            >
              <span header>{{ module.title | translate }}</span>
            </app-secondary-card-info>
          }
        </div>
      </div>

      <div class="order-2" appScrollReveal [hiddenClasses]="['opacity-0', 'translate-x-12']">
        <img
          src="/images/premiumerp.jpg"
          alt="PremiumERP"
          class="rounded-xl shadow-2xl w-full h-auto object-cover dark:opacity-90"
        />
      </div>
    </div>
  </div>
</section>
